<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Today's List</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:      #0F0F14;
    --paper:    #F7F4EE;
    --card:     #FFFFFF;
    --ghost:    #1E1E26;
    --sage:     #8BAF8D;
    --amber:    #E8A045;
    --slate:    #9090A0;
    --danger:   #C0524A;
    --border:   #E2DED6;
    --shadow:   0 2px 8px rgba(15,15,20,0.07), 0 0 0 1px rgba(15,15,20,0.04);
    --shadow-lg: 0 8px 32px rgba(15,15,20,0.12), 0 0 0 1px rgba(15,15,20,0.06);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 16px 80px;
  }

  /* ── Header ── */
  .header {
    width: 100%;
    max-width: 560px;
    margin-bottom: 36px;
  }
  .header-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--slate);
    margin-bottom: 6px;
  }
  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(36px, 7vw, 52px);
    line-height: 1.05;
    color: var(--ink);
  }
  .header h1 em {
    font-style: italic;
    color: var(--sage);
  }

  /* ── Progress bar ── */
  .progress-wrap {
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-track {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--sage), var(--amber));
    border-radius: 99px;
    width: 0%;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .progress-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--slate);
    white-space: nowrap;
    min-width: 60px;
    text-align: right;
  }

  /* ── Input bar ── */
  .input-card {
    width: 100%;
    max-width: 560px;
    background: var(--card);
    border-radius: 14px;
    box-shadow: var(--shadow-lg);
    padding: 6px 6px 6px 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    border: 1.5px solid transparent;
    transition: border-color 0.2s;
  }
  .input-card:focus-within {
    border-color: var(--sage);
  }
  .input-card input {
    flex: 1;
    border: none;
    outline: none;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 400;
    color: var(--ink);
    background: transparent;
    padding: 10px 0;
  }
  .input-card input::placeholder { color: var(--slate); }
  .add-btn {
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 9px;
    padding: 10px 18px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .add-btn:hover { background: var(--ghost); }
  .add-btn:active { transform: scale(0.97); }

  /* ── Filter tabs ── */
  .filters {
    width: 100%;
    max-width: 560px;
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    background: var(--border);
    padding: 4px;
    border-radius: 10px;
  }
  .filter-btn {
    flex: 1;
    border: none;
    background: transparent;
    padding: 8px 0;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--slate);
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .filter-btn.active {
    background: var(--card);
    color: var(--ink);
    box-shadow: 0 1px 4px rgba(15,15,20,0.1);
  }
  .filter-btn:not(.active):hover { color: var(--ink); }

  /* ── Task list ── */
  .task-list {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* ── Task item ── */
  .task-item {
    background: var(--card);
    border-radius: 12px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    transition: box-shadow 0.2s, transform 0.15s, opacity 0.25s;
    animation: slideIn 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .task-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--border);
    border-radius: 3px 0 0 3px;
    transition: background 0.2s;
  }
  .task-item.completed::before { background: var(--sage); }
  .task-item:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
  .task-item.removing {
    opacity: 0;
    transform: translateX(20px) scale(0.97);
    pointer-events: none;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Checkbox */
  .task-check {
    width: 20px; height: 20px;
    border-radius: 6px;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s, background 0.15s;
    appearance: none; -webkit-appearance: none;
    position: relative;
  }
  .task-check:checked {
    background: var(--sage);
    border-color: var(--sage);
  }
  .task-check:checked::after {
    content: '';
    position: absolute;
    width: 5px; height: 9px;
    border: 2px solid #fff;
    border-top: none; border-left: none;
    transform: rotate(42deg) translate(-1px, -1px);
  }
  .task-check:hover:not(:checked) { border-color: var(--sage); }

  /* Text */
  .task-text-wrap { flex: 1; min-width: 0; }
  .task-text {
    font-size: 15px;
    font-weight: 400;
    color: var(--ink);
    word-break: break-word;
    transition: color 0.2s;
    display: block;
    outline: none;
    width: 100%;
    background: transparent;
    border: none;
    font-family: 'Inter', sans-serif;
    cursor: text;
    padding: 0;
    line-height: 1.5;
  }
  .task-text.editing {
    border-bottom: 1.5px solid var(--sage);
  }
  .task-item.completed .task-text {
    color: var(--slate);
    text-decoration: line-through;
    text-decoration-color: var(--sage);
    text-decoration-thickness: 1.5px;
  }
  .task-date {
    font-size: 11px;
    color: var(--slate);
    margin-top: 2px;
    display: block;
  }

  /* Actions */
  .task-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .task-item:hover .task-actions { opacity: 1; }
  .task-item:focus-within .task-actions { opacity: 1; }
  .action-btn {
    width: 30px; height: 30px;
    border: none; background: transparent;
    border-radius: 7px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    color: var(--slate);
    font-size: 14px;
  }
  .action-btn:hover { background: var(--paper); color: var(--ink); }
  .action-btn.delete:hover { background: #FDF0EF; color: var(--danger); }

  /* ── Empty state ── */
  .empty-state {
    width: 100%;
    max-width: 560px;
    text-align: center;
    padding: 60px 20px;
    color: var(--slate);
    display: none;
  }
  .empty-state.visible { display: block; }
  .empty-icon {
    font-size: 40px;
    margin-bottom: 12px;
    opacity: 0.5;
  }
  .empty-state h3 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--ink);
    margin-bottom: 6px;
    font-weight: 400;
  }
  .empty-state p { font-size: 14px; }

  /* ── Footer actions ── */
  .list-footer {
    width: 100%;
    max-width: 560px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 4px 0;
    font-size: 13px;
    color: var(--slate);
  }
  .clear-btn {
    background: none;
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--slate);
    cursor: pointer;
    padding: 4px 0;
    transition: color 0.15s;
  }
  .clear-btn:hover { color: var(--danger); }

  /* ── Drag indicator ── */
  .task-drag { cursor: grab; color: var(--border); font-size: 16px; flex-shrink: 0; }
  .task-drag:active { cursor: grabbing; }
  .task-item.drag-over { box-shadow: 0 0 0 2px var(--sage); }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-eyebrow">Task Manager</div>
  <h1>Get things <em>done.</em></h1>
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">0 of 0</div>
  </div>
</header>

<div class="input-card">
  <input type="text" id="taskInput" placeholder="What needs to be done?" maxlength="200" autocomplete="off">
  <button class="add-btn" id="addBtn">Add task</button>
</div>

<div class="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="active">Active</button>
  <button class="filter-btn" data-filter="completed">Completed</button>
</div>

<ul class="task-list" id="taskList"></ul>

<div class="empty-state" id="emptyState">
  <div class="empty-icon">✦</div>
  <h3>Nothing here yet</h3>
  <p>Add a task above to get started.</p>
</div>

<div class="list-footer" id="listFooter">
  <span id="remainingCount"></span>
  <button class="clear-btn" id="clearCompletedBtn">Clear completed</button>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────
  const STORAGE_KEY = 'todo_app_tasks_v1';
  let tasks = [];
  let currentFilter = 'all';
  let dragSrcIndex = null;

  // ── Persistence ────────────────────────────────────────────────────
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      tasks = raw ? JSON.parse(raw) : [];
    } catch { tasks = []; }
  }

  // ── CRUD operations ───────────────────────────────────────────────
  function createTask(text) {
    return {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2),
      text: text.trim(),
      completed: false,
      createdAt: new Date().toISOString(),
    };
  }

  function addTask(text) {
    if (!text.trim()) return;
    tasks.unshift(createTask(text));
    save();
    render();
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.completed = !t.completed; save(); render(); }
  }

  function deleteTask(id) {
    const item = document.querySelector(`[data-id="${id}"]`);
    if (item) {
      item.classList.add('removing');
      setTimeout(() => {
        tasks = tasks.filter(t => t.id !== id);
        save();
        render();
      }, 250);
    }
  }

  function updateTaskText(id, newText) {
    const t = tasks.find(t => t.id === id);
    if (t && newText.trim()) { t.text = newText.trim(); save(); }
    else if (t && !newText.trim()) render(); // restore old text
  }

  function clearCompleted() {
    tasks = tasks.filter(t => !t.completed);
    save();
    render();
  }

  // ── Rendering ─────────────────────────────────────────────────────
  function filteredTasks() {
    if (currentFilter === 'active') return tasks.filter(t => !t.completed);
    if (currentFilter === 'completed') return tasks.filter(t => t.completed);
    return tasks;
  }

  function formatDate(iso) {
    const d = new Date(iso);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return 'just now';
    if (diff < 3600000) return `${Math.floor(diff/60000)}m ago`;
    if (diff < 86400000) return `${Math.floor(diff/3600000)}h ago`;
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  }

  function renderTask(task, index) {
    const li = document.createElement('li');
    li.className = 'task-item' + (task.completed ? ' completed' : '');
    li.setAttribute('data-id', task.id);
    li.setAttribute('data-index', index);
    li.setAttribute('draggable', 'true');

    li.innerHTML = `
      <span class="task-drag" title="Drag to reorder">⠿</span>
      <input type="checkbox" class="task-check" ${task.completed ? 'checked' : ''} aria-label="Mark complete">
      <div class="task-text-wrap">
        <span class="task-text" contenteditable="true" spellcheck="false" role="textbox" aria-label="Task text">${escapeHtml(task.text)}</span>
        <span class="task-date">${formatDate(task.createdAt)}</span>
      </div>
      <div class="task-actions">
        <button class="action-btn edit" title="Edit" aria-label="Edit task">✏️</button>
        <button class="action-btn delete" title="Delete" aria-label="Delete task">✕</button>
      </div>
    `;

    // Checkbox
    li.querySelector('.task-check').addEventListener('change', () => toggleTask(task.id));

    // Inline edit
    const textEl = li.querySelector('.task-text');
    li.querySelector('.action-btn.edit').addEventListener('click', () => {
      textEl.focus();
      const range = document.createRange();
      range.selectNodeContents(textEl);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
    });

    textEl.addEventListener('focus', () => textEl.classList.add('editing'));
    textEl.addEventListener('blur', () => {
      textEl.classList.remove('editing');
      updateTaskText(task.id, textEl.textContent);
    });
    textEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); textEl.blur(); }
      if (e.key === 'Escape') { textEl.textContent = task.text; textEl.blur(); }
    });

    // Delete
    li.querySelector('.action-btn.delete').addEventListener('click', () => deleteTask(task.id));

    // Drag & Drop
    li.addEventListener('dragstart', e => {
      dragSrcIndex = index;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => li.style.opacity = '0.4', 0);
    });
    li.addEventListener('dragend', () => { li.style.opacity = ''; document.querySelectorAll('.task-item').forEach(el => el.classList.remove('drag-over')); });
    li.addEventListener('dragover', e => { e.preventDefault(); li.classList.add('drag-over'); });
    li.addEventListener('dragleave', () => li.classList.remove('drag-over'));
    li.addEventListener('drop', e => {
      e.preventDefault();
      li.classList.remove('drag-over');
      if (dragSrcIndex === null || dragSrcIndex === index) return;
      const visible = filteredTasks();
      const srcTask = visible[dragSrcIndex];
      const destTask = visible[index];
      const srcReal = tasks.indexOf(srcTask);
      const destReal = tasks.indexOf(destTask);
      tasks.splice(destReal, 0, tasks.splice(srcReal, 1)[0]);
      dragSrcIndex = null;
      save();
      render();
    });

    return li;
  }

  function render() {
    const list = document.getElementById('taskList');
    const emptyState = document.getElementById('emptyState');
    const footer = document.getElementById('listFooter');
    const fill = document.getElementById('progressFill');
    const label = document.getElementById('progressLabel');
    const remaining = document.getElementById('remainingCount');
    const clearBtn = document.getElementById('clearCompletedBtn');

    const visible = filteredTasks();
    list.innerHTML = '';
    visible.forEach((task, i) => list.appendChild(renderTask(task, i)));

    // Empty state
    const isEmpty = visible.length === 0;
    emptyState.classList.toggle('visible', isEmpty);

    // Update empty state message
    const emptyTitle = emptyState.querySelector('h3');
    const emptyMsg = emptyState.querySelector('p');
    if (currentFilter === 'completed') {
      emptyTitle.textContent = 'No completed tasks';
      emptyMsg.textContent = 'Complete some tasks to see them here.';
    } else if (currentFilter === 'active') {
      emptyTitle.textContent = 'All done!';
      emptyMsg.textContent = 'You have no active tasks right now.';
    } else {
      emptyTitle.textContent = 'Nothing here yet';
      emptyMsg.textContent = 'Add a task above to get started.';
    }

    // Progress
    const total = tasks.length;
    const done = tasks.filter(t => t.completed).length;
    const pct = total ? Math.round((done / total) * 100) : 0;
    fill.style.width = pct + '%';
    label.textContent = `${done} of ${total}`;

    // Footer
    const activeCount = tasks.filter(t => !t.completed).length;
    const completedCount = tasks.filter(t => t.completed).length;
    remaining.textContent = activeCount === 1 ? '1 task left' : `${activeCount} tasks left`;
    clearBtn.style.visibility = completedCount > 0 ? 'visible' : 'hidden';
    footer.style.display = tasks.length ? 'flex' : 'none';
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Event Listeners ────────────────────────────────────────────────
  document.getElementById('addBtn').addEventListener('click', () => {
    const input = document.getElementById('taskInput');
    addTask(input.value);
    input.value = '';
    input.focus();
  });

  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('addBtn').click();
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentFilter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  document.getElementById('clearCompletedBtn').addEventListener('click', clearCompleted);

  // ── Init ──────────────────────────────────────────────────────────
  load();
  render();

  // Seed with example tasks if empty
  if (tasks.length === 0) {
    ['Review project proposal', 'Send weekly update email', 'Book team lunch for Friday'].forEach(text => {
      tasks.push(createTask(text));
    });
    tasks[2].completed = true;
    save();
    render();
  }
</script>
</body>
</html>
